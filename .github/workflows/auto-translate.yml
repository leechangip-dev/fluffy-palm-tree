name: Auto Translate

on:
  push:
    branches-ignore:
      - main
    paths:
      - "samples/**"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find changed source files
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # 신규 브랜치(before가 000...) 이면 전체 samples/ 스캔, 아니면 diff
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "신규 브랜치 — samples/ 전체 스캔"
            ALL=$(git ls-files samples/)
          else
            ALL=$(git diff --name-only "$BEFORE" "$AFTER" -- samples/)
          fi

          # 번역 결과 파일(언어코드 포함) 제외
          CHANGED=$(echo "$ALL" \
            | grep -E '\.(md|txt|json|yaml|yml)$' \
            | grep -vE '\.(en|ja|zh|zh-tw|es|fr|de|pt|vi|ko)\.(md|txt|json|yaml|yml)$' \
            || true)

          echo "감지된 소스 파일:"
          echo "${CHANGED:-없음}"

          # 줄바꿈을 공백으로 변환해서 output에 저장
          FILES=$(echo "$CHANGED" | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Translate
        if: steps.detect.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for file in ${{ steps.detect.outputs.files }}; do
            [ -f "$file" ] || continue
            echo ""
            echo "=== 번역 시작: $file ==="
            python src/cli.py file "$file" -t en,ja,zh --delay 0.5
          done

      - name: Commit translations
        if: steps.detect.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/
          if git diff --staged --quiet; then
            echo "새로운 번역 파일 없음"
          else
            git commit -m "chore: auto-translate updated source files [skip ci]"
            git push
          fi
