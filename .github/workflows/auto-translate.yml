name: Auto Translate

on:
  push:
    branches-ignore:
      - main
    paths:
      - "samples/**"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug info
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Anthropic installed ==="
          pip show anthropic | head -3
          echo "=== API key set ==="
          if [ -n "$ANTHROPIC_API_KEY" ]; then echo "YES"; else echo "NO — secret missing!"; fi
          echo "=== Changed files ==="
          git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || echo "(diff failed)"
          echo "=== Repo structure ==="
          ls -la
          ls -la src/
          ls -la samples/
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Translate changed source files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BEFORE="${{ github.event.before }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files samples/ | grep -E '\.(md|txt|json|yaml|yml)$' | grep -vE '\.(en|ja|zh|zh-tw|es|fr|de|pt|vi|ko)\.' || true)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- samples/ | grep -E '\.(md|txt|json|yaml|yml)$' | grep -vE '\.(en|ja|zh|zh-tw|es|fr|de|pt|vi|ko)\.' || true)
          fi

          echo "번역 대상: ${CHANGED:-없음}"

          if [ -z "$CHANGED" ]; then
            echo "번역할 파일 없음 — 종료"
            exit 0
          fi

          for file in $CHANGED; do
            [ -f "$file" ] || continue
            echo "=== 번역: $file ==="
            python src/cli.py file "$file" -t en,ja,zh --delay 0.5
          done

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/
          if git diff --staged --quiet; then
            echo "새 번역 파일 없음"
          else
            git commit -m "chore: auto-translate updated source files [skip ci]"
            git push
          fi
