name: Auto Translate

on:
  push:
    branches-ignore:
      - main
    paths:
      - "samples/**"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find changed source files
        id: detect
        run: |
          BEFORE="${{ github.event.before }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files samples/ | grep -E '\.(md|txt|json|yaml|yml)$' | grep -vE '\.(en|ja|zh|zh-tw|es|fr|de|pt|vi|ko)\.' || true)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- samples/ | grep -E '\.(md|txt|json|yaml|yml)$' | grep -vE '\.(en|ja|zh|zh-tw|es|fr|de|pt|vi|ko)\.' || true)
          fi

          echo "번역 대상: ${CHANGED:-없음}"
          FILES=$(echo "$CHANGED" | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Translate
        if: steps.detect.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for file in ${{ steps.detect.outputs.files }}; do
            [ -f "$file" ] || continue
            echo "=== 번역: $file ==="
            python src/cli.py file "$file" -t en,ja,zh --delay 0.5
          done

      - name: Validate translations
        if: steps.detect.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for file in ${{ steps.detect.outputs.files }}; do
            [ -f "$file" ] || continue
            echo ""
            echo "=== 검증: $file ==="
            python src/cli.py validate "$file" -t en,ja,zh
          done

      - name: Commit translations
        if: steps.detect.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/
          if git diff --staged --quiet; then
            echo "새 번역 파일 없음"
          else
            git commit -m "chore: auto-translate updated source files [skip ci]"
            git push
          fi
